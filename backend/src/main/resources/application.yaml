ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.example.proscan.ApplicationKt.module

jwt:
  secret: "proscan-super-secret-key-change-in-production-2026"
  issuer: "proscan-api"
  audience: "proscan-app"
  realm: "ProScan"
  accessTokenExpiryMs: "3600000"
  refreshTokenExpiryMs: "604800000"

database:
  url: "jdbc:h2:file:./data/proscan;DB_CLOSE_DELAY=-1"
  driver: "org.h2.Driver"

storage:
  uploadDir: "./uploads"
